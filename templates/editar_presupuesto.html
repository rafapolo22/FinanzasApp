{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning">Editar Presupuesto</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small">Categoría</label>
                        <select name="categoria_id" class="form-select" required>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}" {% if cat.id == p.categoria_id %}selected{% endif %}>{{ cat.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Límite de Monto</label>
                        <input type="number" step="0.01" name="monto" class="form-control" required value="{{ p.monto_limite }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Periodo</label>
                        <select name="periodo" class="form-select">
                            <option value="Mensual" {% if p.periodo == 'Mensual' %}selected{% endif %}>Mensual</option>
                            <option value="Anual" {% if p.periodo == 'Anual' %}selected{% endif %}>Anual</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Fecha Inicio</label>
                        <input type="date" name="fecha_inicio" class="form-control" required value="{{ p.fecha_inicio }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Fecha Fin</label>
                        <input type="date" name="fecha_fin" class="form-control" required value="{{ p.fecha_fin }}">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning w-100">Actualizar</button>
                        <a href="{{ url_for('gestion_presupuestos') }}" class="btn btn-secondary w-100">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
