{% extends "layout.html" %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <div class="card shadow mb-4">
            <div class="card-header bg-success text-white">Nueva Transacción</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-2">
                        <label class="form-label small">Cuenta</label>
                        <select name="cuenta_id" class="form-select form-select-sm" required>
                            {% for c in cuentas %}
                            <option value="{{ c.id }}">{{ c.nombre }} ({{ c.saldo_actual }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Categoría</label>
                        <select name="categoria_id" class="form-select form-select-sm" required>
                            {% for cat in categorias %}
                            <option value="{{ cat.id }}">{{ cat.nombre }} ({{ cat.tipo }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Monto</label>
                        <input type="number" step="0.01" name="monto" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Tipo</label>
                        <select name="tipo" class="form-select form-select-sm">
                            <option value="Gasto">Gasto</option>
                            <option value="Ingreso">Ingreso</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small">Fecha</label>
                        <input type="date" name="fecha" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Descripción</label>
                        <textarea name="descripcion" class="form-control form-control-sm" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">Historial</div>
            <div class="card-body p-0">
                <table class="table table-sm table-striped mb-0">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Cuenta</th>
                            <th>Categoría</th>
                            <th>Tipo</th>
                            <th class="text-end">Monto</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for t in transacciones %}
                        <tr>
                            <td>{{ t.fecha }}</td>
                            <td>{{ t.nombre_cuenta }}</td>
                            <td>{{ t.nombre_categoria }}</td>
                            <td><span class="badge {% if t.tipo == 'Ingreso' %}bg-success{% else %}bg-danger{% endif %}">{{ t.tipo }}</span></td>
                            <td class="text-end">{{ t.monto }}</td>
                            <td class="text-center">
                                <a href="{{ url_for('editar_transaccion', id=t.id) }}" class="btn btn-xs btn-outline-warning" style="padding: 0.1rem 0.3rem; font-size: 0.75rem;">Editar</a>
                                <button type="button" class="btn btn-xs btn-outline-danger" 
                                        style="padding: 0.1rem 0.3rem; font-size: 0.75rem;"
                                        data-bs-toggle="modal" data-bs-target="#deleteModal" 
                                        data-bs-url="{{ url_for('eliminar_transaccion', id=t.id) }}">
                                    Eliminar
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
