{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-white p-0">
                <ul class="nav nav-tabs nav-fill" id="authTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active py-3 fw-bold" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">INICIAR SESIÓN</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link py-3 fw-bold" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">REGISTRARSE</button>
                    </li>
                </ul>
            </div>
            <div class="card-body p-4">
                <div class="tab-content" id="authTabContent">
                    <!-- Sección de Login -->
                    <div class="tab-pane fade show active" id="login" role="tabpanel">
                        <form action="{{ url_for('login') }}" method="POST">
                            <input type="hidden" name="action" value="login">
                            <div class="mb-3">
                                <label for="login_email" class="form-label text-muted small fw-bold">EMAIL</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                                    <input type="email" name="email" id="login_email" class="form-control bg-light border-start-0" required placeholder="tu@email.com">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="login_password" class="form-label text-muted small fw-bold">CONTRASEÑA</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" id="login_password" class="form-control bg-light border-start-0" required placeholder="********">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">ENTRAR</button>
                        </form>
                    </div>

                    <!-- Sección de Registro -->
                    <div class="tab-pane fade" id="register" role="tabpanel">
                        <form action="{{ url_for('login') }}" method="POST">
                            <input type="hidden" name="action" value="register">
                            <div class="mb-3">
                                <label for="reg_nombre" class="form-label text-muted small fw-bold">NOMBRE COMPLETO</label>
                                <input type="text" name="nombre" id="reg_nombre" class="form-control bg-light" required placeholder="Juan Pérez">
                            </div>
                            <div class="mb-3">
                                <label for="reg_email" class="form-label text-muted small fw-bold">EMAIL</label>
                                <input type="email" name="email" id="reg_email" class="form-control bg-light" required placeholder="tu@email.com">
                            </div>
                            <div class="mb-4">
                                <label for="reg_password" class="form-label text-muted small fw-bold">CONTRASEÑA</label>
                                <input type="password" name="password" id="reg_password" class="form-control bg-light" required placeholder="Mínimo 8 caracteres">
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">CREAR CUENTA</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-light text-center py-3 border-0">
                <small class="text-muted">FinanzasApp &copy; 2026</small>
            </div>
        </div>
    </div>
</div>

<!-- Incluir iconos de Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
