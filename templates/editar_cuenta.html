{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning">Editar Cuenta</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label small">Nombre de la Cuenta</label>
                        <input type="text" name="nombre" class="form-control" required value="{{ c.nombre }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Tipo</label>
                        <select name="tipo" class="form-select" required>
                            <option value="Ahorros" {% if c.tipo == 'Ahorros' %}selected{% endif %}>Ahorros</option>
                            <option value="Corriente" {% if c.tipo == 'Corriente' %}selected{% endif %}>Corriente</option>
                            <option value="Efectivo" {% if c.tipo == 'Efectivo' %}selected{% endif %}>Efectivo</option>
                            <option value="Tarjeta de Crédito" {% if c.tipo == 'Tarjeta de Crédito' %}selected{% endif %}>Tarjeta de Crédito</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Saldo Inicial</label>
                        <input type="number" step="0.01" name="saldo_inicial" class="form-control" required value="{{ c.saldo_inicial }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small">Divisa</label>
                        <input type="text" name="divisa" class="form-control" required value="{{ c.divisa }}" maxlength="3">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning w-100">Actualizar</button>
                        <a href="{{ url_for('gestion_cuentas') }}" class="btn btn-secondary w-100">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
